<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="中1参考書">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>中1参考書アプリ</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: #f0f4f0;
      color: #1a202c;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ===== Screens ===== */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }

    /* ===== HOME SCREEN ===== */
    #home {
      background: linear-gradient(160deg, #1a4731 0%, #2d6a4f 40%, #40916c 100%);
      padding-bottom: 40px;
    }
    .home-header {
      text-align: center;
      padding: 48px 24px 32px;
    }
    .home-header .app-icon { font-size: 64px; display: block; margin-bottom: 12px; }
    .home-header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .home-header .subtitle {
      color: #b7e4c7;
      font-size: 14px;
      margin-top: 6px;
      letter-spacing: 1px;
    }
    .subject-grid {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .subject-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-align: left;
      width: 100%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .subject-btn::after {
      content: '›';
      position: absolute;
      right: 22px;
      font-size: 28px;
      opacity: 0.7;
    }
    .subject-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .subject-btn .btn-icon { font-size: 36px; }
    .subject-btn .btn-text { display: flex; flex-direction: column; }
    .subject-btn .btn-name { font-size: 22px; letter-spacing: 1px; }
    .subject-btn .btn-sub { font-size: 12px; font-weight: 500; opacity: 0.85; margin-top: 2px; }
    .btn-kokugo  { background: linear-gradient(135deg, #c53030, #e53e3e); }
    .btn-math    { background: linear-gradient(135deg, #2b6cb0, #3182ce); }
    .btn-rika    { background: linear-gradient(135deg, #276749, #38a169); }
    .btn-shakai  { background: linear-gradient(135deg, #b7791f, #d69e2e); }
    .btn-eigo    { background: linear-gradient(135deg, #553c9a, #805ad5); }

    /* ===== SUBJECT SCREEN ===== */
    #subject { background: #f7fafc; }
    .subject-header {
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .subject-header-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      color: #fff;
    }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 20px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:active { background: rgba(255,255,255,0.4); }
    .subject-header-icon { font-size: 30px; }
    .subject-header-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
    .subject-header-count { font-size: 12px; opacity: 0.8; margin-top: 1px; }
    .topic-list { padding: 16px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 40px; }

    /* ===== TOPIC CARD ===== */
    .topic-card {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      background: #fff;
    }
    .topic-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    .topic-header .topic-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .topic-header .topic-icon { font-size: 22px; }
    .topic-header .topic-title { font-size: 16px; font-weight: 800; color: #fff; flex: 1; }
    .topic-header .toggle-icon {
      color: rgba(255,255,255,0.8);
      font-size: 20px;
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .topic-card.open .toggle-icon { transform: rotate(180deg); }
    .topic-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .topic-card.open .topic-body { max-height: 9999px; }
    .topic-content { padding: 16px; }

    /* ===== Content Blocks ===== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 14px 0 6px;
      opacity: 0.6;
    }
    .section-label:first-child { margin-top: 0; }

    /* Highlight box */
    .box {
      border-radius: 10px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.7;
    }
    .box-red    { background: #fff5f5; border-left: 4px solid #e53e3e; }
    .box-blue   { background: #ebf8ff; border-left: 4px solid #3182ce; }
    .box-green  { background: #f0fff4; border-left: 4px solid #38a169; }
    .box-orange { background: #fffaf0; border-left: 4px solid #d69e2e; }
    .box-purple { background: #faf5ff; border-left: 4px solid #805ad5; }
    .box-gray   { background: #f7fafc; border-left: 4px solid #718096; }
    .box-pink   { background: #fff0f6; border-left: 4px solid #d63384; }
    .box-teal   { background: #e6fffa; border-left: 4px solid #319795; }
    .box-yellow { background: #fffff0; border-left: 4px solid #d69e2e; }

    /* Callout / tip box */
    .callout {
      border-radius: 10px;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.7;
      display: flex;
      gap: 8px;
    }
    .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .callout-red    { background: #fff5f5; border: 1.5px solid #feb2b2; }
    .callout-blue   { background: #ebf8ff; border: 1.5px solid #90cdf4; }
    .callout-green  { background: #f0fff4; border: 1.5px solid #9ae6b4; }
    .callout-orange { background: #fffaf0; border: 1.5px solid #fbd38d; }
    .callout-purple { background: #faf5ff; border: 1.5px solid #d6bcfa; }
    .callout-yellow { background: #fffff0; border: 1.5px solid #f6e05e; }

    /* Pill / tag */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .tag-red    { background: #fed7d7; color: #c53030; }
    .tag-blue   { background: #bee3f8; color: #2b6cb0; }
    .tag-green  { background: #c6f6d5; color: #276749; }
    .tag-orange { background: #feebc8; color: #c05621; }
    .tag-purple { background: #e9d8fd; color: #553c9a; }
    .tag-pink   { background: #fed7e2; color: #97266d; }
    .tag-teal   { background: #b2f5ea; color: #234e52; }
    .tag-gray   { background: #e2e8f0; color: #4a5568; }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 8px 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .data-table th {
      padding: 8px 10px;
      text-align: left;
      font-weight: 700;
      color: #fff;
      font-size: 12px;
    }
    .data-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: top;
      line-height: 1.5;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:nth-child(even) td { background: #f7fafc; }

    /* Formula box */
    .formula {
      background: #1a202c;
      color: #f6e05e;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 14px;
      margin: 6px 0;
      letter-spacing: 0.5px;
    }

    /* Key term inline */
    .kw { font-weight: 800; }
    .kw-red    { color: #c53030; }
    .kw-blue   { color: #2b6cb0; }
    .kw-green  { color: #276749; }
    .kw-orange { color: #c05621; }
    .kw-purple { color: #553c9a; }

    /* Divider */
    .divider { height: 1px; background: #e2e8f0; margin: 10px 0; }

    /* List */
    .content-list { list-style: none; padding: 0; margin: 4px 0; }
    .content-list li {
      padding: 4px 0 4px 20px;
      position: relative;
      font-size: 14px;
      line-height: 1.6;
    }
    .content-list li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #a0aec0;
    }

    /* Grid 2-col */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 6px 0; }

    /* ===== Subject color themes ===== */
    /* 国語 red */
    .theme-kokugo .subject-header { background: linear-gradient(135deg, #c53030, #e53e3e); }
    .theme-kokugo .topic-header   { background: linear-gradient(135deg, #c53030, #e53e3e); }
    .theme-kokugo .data-table th  { background: #e53e3e; }

    /* 数学 blue */
    .theme-math .subject-header { background: linear-gradient(135deg, #2b6cb0, #3182ce); }
    .theme-math .topic-header   { background: linear-gradient(135deg, #2b6cb0, #3182ce); }
    .theme-math .data-table th  { background: #3182ce; }

    /* 理科 green */
    .theme-rika .subject-header { background: linear-gradient(135deg, #276749, #38a169); }
    .theme-rika .topic-header   { background: linear-gradient(135deg, #276749, #38a169); }
    .theme-rika .data-table th  { background: #38a169; }

    /* 社会 orange */
    .theme-shakai .subject-header { background: linear-gradient(135deg, #b7791f, #d69e2e); }
    .theme-shakai .topic-header   { background: linear-gradient(135deg, #b7791f, #d69e2e); }
    .theme-shakai .data-table th  { background: #d69e2e; }

    /* 英語 purple */
    .theme-eigo .subject-header { background: linear-gradient(135deg, #553c9a, #805ad5); }
    .theme-eigo .topic-header   { background: linear-gradient(135deg, #553c9a, #805ad5); }
    .theme-eigo .data-table th  { background: #805ad5; }

    /* ===== Utility ===== */
    p { font-size: 14px; line-height: 1.7; margin: 4px 0; }
    strong { font-weight: 800; }
    small { font-size: 12px; color: #718096; }
    .mt8 { margin-top: 8px; }
    .mb8 { margin-bottom: 8px; }
    .center { text-align: center; }
  </style>
</head>
<body>

<!-- ========== HOME SCREEN ========== -->
<section id="home" class="screen active">
  <div class="home-header">
    <span class="app-icon">📚</span>
    <h1>中1 参考書</h1>
    <p class="subtitle">中学校1年生 ・ 5教科まとめ</p>
  </div>
  <div class="subject-grid">
    <button class="subject-btn btn-kokugo" onclick="showSubject('kokugo')">
      <span class="btn-icon">📖</span>
      <span class="btn-text">
        <span class="btn-name">国語</span>
        <span class="btn-sub">漢字・文法・古典・詩歌</span>
      </span>
    </button>
    <button class="subject-btn btn-math" onclick="showSubject('math')">
      <span class="btn-icon">🔢</span>
      <span class="btn-text">
        <span class="btn-name">数学</span>
        <span class="btn-sub">正負の数・文字式・方程式・図形</span>
      </span>
    </button>
    <button class="subject-btn btn-rika" onclick="showSubject('rika')">
      <span class="btn-icon">🔬</span>
      <span class="btn-text">
        <span class="btn-name">理科</span>
        <span class="btn-sub">植物・動物・物質・光・力</span>
      </span>
    </button>
    <button class="subject-btn btn-shakai" onclick="showSubject('shakai')">
      <span class="btn-icon">🌏</span>
      <span class="btn-text">
        <span class="btn-name">社会</span>
        <span class="btn-sub">地理・歴史（原始〜鎌倉）</span>
      </span>
    </button>
    <button class="subject-btn btn-eigo" onclick="showSubject('eigo')">
      <span class="btn-icon">🔤</span>
      <span class="btn-text">
        <span class="btn-name">英語</span>
        <span class="btn-sub">be動詞・一般動詞・文法基礎</span>
      </span>
    </button>
  </div>
</section>

<!-- ========== SUBJECT SCREEN ========== -->
<section id="subject" class="screen">
  <div class="subject-header">
    <div class="subject-header-inner">
      <button class="back-btn" onclick="showHome()">&#8592;</button>
      <span class="subject-header-icon" id="subjectIcon"></span>
      <div>
        <div class="subject-header-title" id="subjectTitle"></div>
        <div class="subject-header-count" id="subjectCount"></div>
      </div>
    </div>
  </div>
  <div class="topic-list" id="topicList"></div>
</section>

<script>
// ===================================================
// DATA
// ===================================================
const subjects = {
  kokugo: {
    name: '国語',
    icon: '📖',
    theme: 'theme-kokugo',
    color: '#e53e3e',
    topics: [
      {
        icon: '🈳',
        title: '漢字の知識',
        content: `
<p class="section-label">📌 音読み・訓読み</p>
<div class="box box-red">
  <strong class="kw kw-red">音読み</strong>：中国語に由来する読み方　例）山（さん）・川（せん）<br>
  <strong class="kw kw-red">訓読み</strong>：日本語本来の読み方　例）山（やま）・川（かわ）
</div>
<div class="callout callout-red"><span class="callout-icon">⚠️</span><div>一つの漢字に音読みと訓読みが両方ある場合が多い。「山」→ 音：サン、訓：やま</div></div>

<p class="section-label">🏗️ 部首の種類</p>
<table class="data-table">
  <tr><th>部首名</th><th>位置</th><th>例</th></tr>
  <tr><td>へん</td><td>左側</td><td>氵（さんずい）・木偏</td></tr>
  <tr><td>つくり</td><td>右側</td><td>刀（りっとう）・力</td></tr>
  <tr><td>かんむり</td><td>上側</td><td>艹（くさかんむり）・宀</td></tr>
  <tr><td>あし</td><td>下側</td><td>灬（れっか）・心</td></tr>
  <tr><td>たれ</td><td>左〜下</td><td>广（まだれ）・尸</td></tr>
  <tr><td>にょう</td><td>左〜右</td><td>辶（しんにょう）・走</td></tr>
  <tr><td>かまえ</td><td>囲む</td><td>囗（くにがまえ）・門</td></tr>
</table>

<p class="section-label">✏️ 筆順の原則</p>
<div class="tag-row">
  <span class="tag tag-red">上から下へ</span>
  <span class="tag tag-red">左から右へ</span>
  <span class="tag tag-red">横から縦へ</span>
  <span class="tag tag-red">外から内へ</span>
</div>

<p class="section-label">🔢 画数の例</p>
<div class="grid2">
  <div class="box box-gray center"><strong>木</strong> → <span class="kw kw-red">4画</span></div>
  <div class="box box-gray center"><strong>口</strong> → <span class="kw kw-red">3画</span></div>
  <div class="box box-gray center"><strong>山</strong> → <span class="kw kw-red">3画</span></div>
  <div class="box box-gray center"><strong>田</strong> → <span class="kw kw-red">5画</span></div>
</div>`
      },
      {
        icon: '🗂️',
        title: '品詞の分類',
        content: `
<p class="section-label">📋 品詞一覧</p>
<div class="box box-red">
  <strong class="kw kw-red">自立語</strong>（単独で文節をつくれる）：<br>
  名詞・動詞・形容詞・形容動詞・副詞・連体詞・接続詞・感動詞
</div>
<div class="box box-pink">
  <strong class="kw" style="color:#97266d">付属語</strong>（単独で文節をつくれない）：<br>
  <strong>助詞・助動詞</strong>
</div>

<p class="section-label">🔄 活用の有無</p>
<table class="data-table">
  <tr><th>分類</th><th>品詞</th><th>例</th></tr>
  <tr><td><strong class="kw kw-red">用言</strong>（活用する）</td><td>動詞・形容詞・形容動詞</td><td>走る・美しい・静かだ</td></tr>
  <tr><td><strong class="kw kw-red">体言</strong>（活用しない）</td><td>名詞</td><td>犬・東京・三つ</td></tr>
  <tr><td>その他の自立語</td><td>副詞・連体詞・接続詞・感動詞</td><td>とても・この・しかし・ああ</td></tr>
</table>

<div class="callout callout-red"><span class="callout-icon">💡</span><div><strong>体言は主語になれる</strong>、用言は述語になれる、と覚えよう！</div></div>

<p class="section-label">🏷️ 各品詞の説明</p>
<ul class="content-list">
  <li><strong>名詞</strong>：物事の名前（机・自由・三つ）</li>
  <li><strong>動詞</strong>：動作・存在（走る・ある・食べる）</li>
  <li><strong>形容詞</strong>：状態「い」で終わる（高い・美しい）</li>
  <li><strong>形容動詞</strong>：状態「だ/な」（静かだ・元気な）</li>
  <li><strong>副詞</strong>：主に用言を修飾（とても・もっと）</li>
  <li><strong>連体詞</strong>：体言のみ修飾（この・ある・いわゆる）</li>
  <li><strong>接続詞</strong>：文をつなぐ（しかし・そして・だから）</li>
  <li><strong>感動詞</strong>：感動・呼びかけ（ああ・ねえ・はい）</li>
</ul>`
      },
      {
        icon: '🔀',
        title: '動詞の活用',
        content: `
<p class="section-label">📊 活用の種類</p>
<table class="data-table">
  <tr><th>種類</th><th>語幹</th><th>未然</th><th>連用</th><th>終止</th><th>連体</th><th>仮定</th><th>命令</th></tr>
  <tr><td><strong>五段</strong><br><small>書く</small></td><td>書</td><td>か</td><td>き</td><td>く</td><td>く</td><td>け</td><td>け</td></tr>
  <tr><td><strong>上一段</strong><br><small>見る</small></td><td>見</td><td>み</td><td>み</td><td>みる</td><td>みる</td><td>みれ</td><td>みよ</td></tr>
  <tr><td><strong>下一段</strong><br><small>食べる</small></td><td>食べ</td><td>食べ</td><td>食べ</td><td>食べる</td><td>食べる</td><td>食べれ</td><td>食べよ</td></tr>
  <tr><td><strong>カ変</strong><br><small>来る</small></td><td>—</td><td>こ</td><td>き</td><td>くる</td><td>くる</td><td>くれ</td><td>こい</td></tr>
  <tr><td><strong>サ変</strong><br><small>する</small></td><td>—</td><td>し</td><td>し</td><td>する</td><td>する</td><td>すれ</td><td>せよ</td></tr>
</table>

<div class="callout callout-red"><span class="callout-icon">⚠️</span><div><strong>カ行変格（来る）とサ行変格（する）</strong>は不規則変化！丸ごと覚えよう。</div></div>

<p class="section-label">🔑 活用形の用法</p>
<ul class="content-list">
  <li><strong>未然形</strong>：「ない・う・よう・れる」などが続く</li>
  <li><strong>連用形</strong>：「た・て・ます」などが続く、中止法</li>
  <li><strong>終止形</strong>：文を言い切る</li>
  <li><strong>連体形</strong>：体言（名詞）が続く</li>
  <li><strong>仮定形</strong>：「ば」が続く</li>
  <li><strong>命令形</strong>：命令して言い切る</li>
</ul>`
      },

// SCREEN MANAGEMENT
// ===================================================
function showHome() {
  document.getElementById('home').classList.add('active');
  document.getElementById('subject').classList.remove('active');
  window.scrollTo(0, 0);
}

function showSubject(subjectKey) {
  const sub = subjects[subjectKey];
  if (!sub) return;

  // Set header
  document.getElementById('subjectIcon').textContent = sub.icon;
  document.getElementById('subjectTitle').textContent = sub.name;
  document.getElementById('subjectCount').textContent = `全${sub.topics.length}トピック`;

  // Apply theme
  const subjectScreen = document.getElementById('subject');
  subjectScreen.className = 'screen active ' + sub.theme;

  // Render topics
  const topicList = document.getElementById('topicList');
  topicList.innerHTML = '';
  sub.topics.forEach((topic, idx) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-header" onclick="toggleCard(this)">
        <span class="topic-num">${idx + 1}</span>
        <span class="topic-icon">${topic.icon}</span>
        <span class="topic-title">${topic.title}</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="topic-body">
        <div class="topic-content">${topic.content}</div>
      </div>
    `;
    topicList.appendChild(card);
  });

  // Switch screens
  document.getElementById('home').classList.remove('active');
  document.getElementById('subject').classList.add('active');
  window.scrollTo(0, 0);
}

function toggleCard(header) {
  const card = header.closest('.topic-card');
  card.classList.toggle('open');
}
