<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 512px; height: 512px; background: transparent; overflow: hidden; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Night sky gradient -->
    <radialGradient id="skyGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#0a0f2e"/>
    </radialGradient>

    <!-- Page glow gradient -->
    <radialGradient id="pageGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fffde0"/>
      <stop offset="100%" stop-color="#fdf4c0"/>
    </radialGradient>

    <!-- Left page gradient (warm) -->
    <linearGradient id="leftPage" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fff9d0"/>
      <stop offset="100%" stop-color="#fdf0b0"/>
    </linearGradient>

    <!-- Right page gradient (warm) -->
    <linearGradient id="rightPage" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff9d0"/>
      <stop offset="100%" stop-color="#fdf0b0"/>
    </linearGradient>

    <!-- Cover leather gradient -->
    <linearGradient id="coverLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c3317"/>
      <stop offset="50%" stop-color="#3d1f0a"/>
      <stop offset="100%" stop-color="#2a1208"/>
    </linearGradient>

    <linearGradient id="coverRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c3317"/>
      <stop offset="50%" stop-color="#3d1f0a"/>
      <stop offset="100%" stop-color="#2a1208"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pageEdge">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#a08040" flood-opacity="0.4"/>
    </filter>

    <filter id="bookShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000033" flood-opacity="0.7"/>
    </filter>

    <clipPath id="leftClip">
      <polygon points="256,92 88,112 86,418 256,400"/>
    </clipPath>
    <clipPath id="rightClip">
      <polygon points="256,92 424,112 422,418 256,400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <g opacity="0.9">
    <circle cx="45" cy="38" r="1.5" fill="white"/>
    <circle cx="102" cy="22" r="1" fill="white"/>
    <circle cx="178" cy="45" r="2" fill="white"/>
    <circle cx="234" cy="18" r="1.5" fill="white"/>
    <circle cx="298" cy="35" r="1" fill="white"/>
    <circle cx="355" cy="20" r="2" fill="white"/>
    <circle cx="412" cy="48" r="1.5" fill="white"/>
    <circle cx="468" cy="28" r="1" fill="white"/>
    <circle cx="72" cy="75" r="1" fill="white"/>
    <circle cx="148" cy="62" r="1.5" fill="white"/>
    <circle cx="388" cy="68" r="1" fill="white"/>
    <circle cx="452" cy="72" r="1.5" fill="white"/>
    <circle cx="30" cy="110" r="1" fill="white"/>
    <circle cx="490" cy="95" r="1.5" fill="white"/>
    <circle cx="22" cy="185" r="1" fill="white"/>
    <circle cx="498" cy="165" r="1" fill="white"/>
  </g>

  <!-- Magical glow behind book -->
  <ellipse cx="256" cy="280" rx="200" ry="160" fill="#ffd060" opacity="0.06"/>
  <ellipse cx="256" cy="280" rx="150" ry="120" fill="#ffe080" opacity="0.08"/>
  <ellipse cx="256" cy="250" rx="100" ry="80" fill="#ffee99" opacity="0.10"/>

  <!-- Book group with shadow -->
  <g filter="url(#bookShadow)">

    <!-- Page stacks (right side) -->
    <g opacity="0.7">
      <polygon points="262,95 428,116 426,416 262,398" fill="#e8d898"/>
      <polygon points="260,94 426,114 424,415 260,397" fill="#ecdea2"/>
      <polygon points="258,93 424,112 422,414 258,396" fill="#f0e4a8"/>
    </g>

    <!-- Page stacks (left side) -->
    <g opacity="0.7">
      <polygon points="250,95 84,116 86,416 250,398" fill="#e8d898"/>
      <polygon points="252,94 86,114 88,415 252,397" fill="#ecdea2"/>
      <polygon points="254,93 88,112 90,414 254,396" fill="#f0e4a8"/>
    </g>

    <!-- Right cover (leather) -->
    <polygon points="256,90 430,112 428,420 256,402" fill="url(#coverRight)" stroke="#2a1208" stroke-width="1"/>
    <!-- Right cover highlight -->
    <polygon points="256,90 430,112 428,420 256,402" fill="none" stroke="#8b5a2b" stroke-width="2" opacity="0.4"/>

    <!-- Left cover (leather) -->
    <polygon points="256,90 82,112 84,420 256,402" fill="url(#coverLeft)" stroke="#2a1208" stroke-width="1"/>
    <!-- Left cover highlight -->
    <polygon points="256,90 82,112 84,420 256,402" fill="none" stroke="#8b5a2b" stroke-width="2" opacity="0.4"/>

    <!-- Right PAGE (front) -->
    <polygon points="256,93 422,114 420,416 256,398" fill="url(#rightPage)" filter="url(#pageEdge)"/>

    <!-- Left PAGE (front) -->
    <polygon points="256,93 90,114 92,416 256,398" fill="url(#leftPage)" filter="url(#pageEdge)"/>

  </g>

  <!-- ===================== LEFT PAGE CONTENT ===================== -->
  <!-- Ghibli forest scene illustration -->
  <g clip-path="url(#leftClip)">
    <!-- Night sky scene on upper left page -->
    <rect x="98" y="118" width="150" height="120" rx="4" fill="#1a3a6e"/>
    <!-- Moon -->
    <circle cx="220" cy="148" r="22" fill="#fff8c0" filter="url(#softGlow)"/>
    <circle cx="228" cy="144" r="16" fill="#1a3a6e"/> <!-- crescent shadow -->
    <!-- Stars in scene -->
    <circle cx="112" cy="128" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="135" cy="122" r="1" fill="white" opacity="0.8"/>
    <circle cx="160" cy="130" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="178" cy="124" r="1" fill="white" opacity="0.8"/>
    <!-- Forest silhouette -->
    <polygon points="96,238 96,195 108,168 120,195 120,238" fill="#0d2a14"/>
    <polygon points="110,238 110,200 124,172 138,200 138,238" fill="#0d2a14"/>
    <polygon points="125,238 125,205 140,178 155,205 155,238" fill="#112e18"/>
    <polygon points="148,238 148,208 160,184 172,208 172,238" fill="#0d2a14"/>
    <polygon points="165,238 165,200 178,174 191,200 191,238" fill="#112e18"/>
    <!-- Ground -->
    <rect x="96" y="234" width="155" height="4" fill="#1a4a22"/>
    <!-- Path -->
    <polygon points="148,238 165,238 185,238 175,238 165,235 155,237" fill="#3a2a10" opacity="0.6"/>
    <!-- Fireflies -->
    <circle cx="128" cy="215" r="2" fill="#ccff66" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="170" cy="205" r="2" fill="#ccff66" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="145" cy="225" r="1.5" fill="#ddff88" opacity="0.7" filter="url(#softGlow)"/>

    <!-- Decorative lines (text) below illustration -->
    <line x1="100" y1="268" x2="244" y2="274" stroke="#8b6a30" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="102" y1="288" x2="238" y2="294" stroke="#6a8b30" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="104" y1="308" x2="240" y2="314" stroke="#308b6a" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="106" y1="328" x2="236" y2="334" stroke="#6a308b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="108" y1="348" x2="238" y2="354" stroke="#8b306a" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="368" x2="236" y2="374" stroke="#8b6a30" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Decorative corner flourish -->
    <text x="102" y="116" font-size="18" fill="#c8a040" opacity="0.8">✦</text>
  </g>

  <!-- ===================== RIGHT PAGE CONTENT ===================== -->
  <g clip-path="url(#rightClip)">
    <!-- Map / scroll style content -->
    <!-- Decorative border -->
    <rect x="268" y="102" width="144" height="308" rx="3" fill="none" stroke="#c8a040" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

    <!-- Compass rose -->
    <g transform="translate(348, 175)">
      <circle r="28" fill="#fdf4c0" stroke="#b8903a" stroke-width="1.5"/>
      <circle r="6" fill="#c8a040"/>
      <!-- N S E W arms -->
      <polygon points="0,-28 -5,-12 5,-12" fill="#c84030"/>
      <polygon points="0,28 -5,12 5,12" fill="#8b6a30"/>
      <polygon points="-28,0 -12,-5 -12,5" fill="#8b6a30"/>
      <polygon points="28,0 12,-5 12,5" fill="#8b6a30"/>
      <!-- Diagonal arms -->
      <line x1="-18" y1="-18" x2="18" y2="18" stroke="#c8a040" stroke-width="1" opacity="0.5"/>
      <line x1="18" y1="-18" x2="-18" y2="18" stroke="#c8a040" stroke-width="1" opacity="0.5"/>
      <text x="-4" y="-14" font-size="8" fill="#c84030" font-weight="bold">N</text>
    </g>

    <!-- Wavy lines (script) -->
    <path d="M272,248 Q295,244 318,250 Q341,256 364,248 Q387,242 408,248" stroke="#8b6a30" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M274,272 Q297,268 320,274 Q343,280 366,272 Q389,266 410,272" stroke="#6a8b30" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M276,296 Q299,292 322,298 Q345,304 368,296 Q391,290 412,296" stroke="#30688b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M278,320 Q301,316 324,322 Q347,328 370,320 Q393,314 412,320" stroke="#8b3068" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M280,344 Q303,340 326,346 Q349,352 372,344" stroke="#8b6a30" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M282,368 Q305,364 328,370 Q351,376 370,368" stroke="#6a308b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M284,390 Q307,386 330,392 Q353,398 368,390" stroke="#308b6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Small star decoration -->
    <text x="398" y="115" font-size="18" fill="#c8a040" opacity="0.8">✦</text>
  </g>

  <!-- Spine -->
  <polygon points="252,88 260,88 258,404 250,404" fill="#2a1208"/>
  <polygon points="253,90 259,90 257,403 251,403" fill="#5c3317"/>
  <!-- Spine gold line -->
  <line x1="256" y1="90" x2="256" y2="403" stroke="#c8a040" stroke-width="1" opacity="0.6"/>

  <!-- Cover gold ornaments -->
  <!-- Left cover decorations -->
  <circle cx="140" cy="135" r="5" fill="#c8a040" opacity="0.7"/>
  <circle cx="100" cy="256" r="5" fill="#c8a040" opacity="0.7"/>
  <circle cx="140" cy="380" r="5" fill="#c8a040" opacity="0.7"/>

  <!-- Right cover decorations -->
  <circle cx="372" cy="135" r="5" fill="#c8a040" opacity="0.7"/>
  <circle cx="412" cy="256" r="5" fill="#c8a040" opacity="0.7"/>
  <circle cx="372" cy="380" r="5" fill="#c8a040" opacity="0.7"/>

  <!-- Floating magical particles above book -->
  <g filter="url(#softGlow)">
    <circle cx="185" cy="75" r="4" fill="#ffe066" opacity="0.9"/>
    <circle cx="220" cy="58" r="3" fill="#aaffcc" opacity="0.85"/>
    <circle cx="256" cy="48" r="5" fill="#fff0aa" opacity="0.9"/>
    <circle cx="292" cy="62" r="3" fill="#ffaacc" opacity="0.85"/>
    <circle cx="328" cy="72" r="4" fill="#aaccff" opacity="0.9"/>
    <circle cx="165" cy="62" r="2.5" fill="#ffccaa" opacity="0.8"/>
    <circle cx="348" cy="58" r="2.5" fill="#ccaaff" opacity="0.8"/>
  </g>

  <!-- Sparkle crosses -->
  <g stroke-linecap="round">
    <line x1="145" y1="60" x2="145" y2="50" stroke="#ffe066" stroke-width="2" opacity="0.9"/>
    <line x1="140" y1="55" x2="150" y2="55" stroke="#ffe066" stroke-width="2" opacity="0.9"/>
    <line x1="368" y1="58" x2="368" y2="48" stroke="#aaffcc" stroke-width="2" opacity="0.9"/>
    <line x1="363" y1="53" x2="373" y2="53" stroke="#aaffcc" stroke-width="2" opacity="0.9"/>
    <line x1="62" y1="240" x2="62" y2="230" stroke="#ffaacc" stroke-width="2" opacity="0.8"/>
    <line x1="57" y1="235" x2="67" y2="235" stroke="#ffaacc" stroke-width="2" opacity="0.8"/>
    <line x1="450" y1="248" x2="450" y2="238" stroke="#aaccff" stroke-width="2" opacity="0.8"/>
    <line x1="445" y1="243" x2="455" y2="243" stroke="#aaccff" stroke-width="2" opacity="0.8"/>
  </g>

</svg>
</body>
</html>
